<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing — {{DATE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505;
  --fg: #ffffff;
  --surface: #0d0d0d;
  --surface2: #111111;
  --line: #262626;
  --mint: #70ffd6;
  --mint-dim: #2fe8b6;
  --mint-glow: rgba(112,255,214,0.08);
  --muted: #9b9b9b;
  --muted2: #666666;
  --green: #3fb950;
  --orange: #ff9f43;
  --red: #ff5c5c;
  --font-sans: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'DM Mono', 'Courier New', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding: 32px 24px;
  max-width: 640px;
  margin: 0 auto;
}

/* ── Header ── */
.header { margin-bottom: 32px; }
.header .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--mint);
  margin-bottom: 8px;
}
.header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -.02em;
  line-height: 1.15;
  margin-bottom: 4px;
}
.header .meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted2);
}

/* ── Quote ── */
.quote-block {
  border-left: 2px solid var(--mint);
  padding: 16px 20px;
  margin-bottom: 28px;
  background: var(--surface);
  border-radius: 0 8px 8px 0;
}
.quote-block .text {
  font-size: 14px;
  color: var(--fg);
  line-height: 1.65;
  font-style: italic;
  margin-bottom: 8px;
}
.quote-block .attr {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}
.quote-block .attr .author { color: var(--mint); font-weight: 500; }

/* ── Section ── */
.section {
  margin-bottom: 28px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.section-header .accent {
  display: inline-block;
  width: 3px;
  height: 14px;
  background: var(--mint);
  border-radius: 2px;
  flex-shrink: 0;
}
.section-header .title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted2);
  font-weight: 500;
}
.section-divider {
  height: 1px;
  background: var(--line);
  margin: 16px 0;
}

/* ── Weather ── */
.weather-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.weather-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
}
.weather-card .day {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 6px;
}
.weather-card .temp {
  font-size: 22px;
  font-weight: 600;
  color: var(--fg);
  line-height: 1;
  margin-bottom: 4px;
}
.weather-card .cond {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}
.weather-card .detail {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted2);
  display: flex;
  gap: 10px;
}

/* ── Schedule ── */
.schedule-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0;
  overflow: hidden;
}
.schedule-card .header-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--surface2);
}
.schedule-card .header-bar .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--mint);
  flex-shrink: 0;
}
.schedule-card .header-bar .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.schedule-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
}
.schedule-item:last-child { border-bottom: none; }
.schedule-item .time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted2);
  min-width: 52px;
  padding-top: 2px;
  flex-shrink: 0;
}
.schedule-item .body { flex: 1; }
.schedule-item .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
}
.schedule-item .meta {
  font-size: 11px;
  color: var(--muted2);
  margin-top: 1px;
}
.deadline-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border-top: 1px solid var(--line);
  background: rgba(255,92,92,.04);
}
.deadline-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
.deadline-item .label {
  font-size: 12px;
  color: var(--fg);
  flex: 1;
}
.deadline-item .date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}
.deadline-item .days {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--orange);
}
.empty-state {
  padding: 20px 16px;
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
  font-family: var(--font-mono);
}

/* ── News ── */
.news-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.news-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 6px;
  transition: border-color .2s;
  text-decoration: none;
  color: inherit;
}
.news-item:hover { border-color: var(--mint); }
.news-item .num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted2);
  min-width: 16px;
  text-align: right;
  padding-top: 2px;
  flex-shrink: 0;
}
.news-item .content { flex: 1; }
.news-item .news-title {
  font-size: 12.5px;
  color: var(--fg);
  line-height: 1.45;
  text-decoration: none;
}
.news-item:hover .news-title { color: var(--mint); }
.news-item .source {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted2);
  margin-top: 2px;
}

/* ── Content idea ── */
.idea-block {
  border-left: 2px solid var(--green);
  padding: 14px 18px;
  background: var(--surface);
  border-radius: 0 8px 8px 0;
  margin-bottom: 28px;
}
.idea-block .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 6px;
}
.idea-block .text {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.55;
  white-space: pre-wrap;
}

/* ── Wiki ── */
.wiki-block {
  border-left: 2px solid var(--muted2);
  padding: 14px 18px;
  background: var(--surface);
  border-radius: 0 8px 8px 0;
  margin-bottom: 28px;
}
.wiki-block .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.wiki-block .text {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── Footer ── */
.footer {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted2);
  padding-top: 20px;
  border-top: 1px solid var(--line);
  margin-top: 32px;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 20px 14px; }
  .weather-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="label">Morning Briefing</div>
  <h1>{{DAY_NAME}}</h1>
  <div class="meta">{{DATE}} | {{GREETING}}</div>
</div>

<!-- QUOTE -->
{{QUOTE_HTML}}

<!-- WEATHER -->
{{WEATHER_HTML}}

<!-- SCHEDULE -->
{{SCHEDULE_HTML}}

<!-- CONTENT IDEA -->
{{IDEA_HTML}}

<!-- WIKI DIGEST -->
{{WIKI_HTML}}

<!-- NEWS -->
{{NEWS_HTML}}

<!-- FOOTER -->
<div class="footer">Generado por Hermes Agent</div>

</body>
</html>
